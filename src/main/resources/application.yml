spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    password: ${REDIS_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${JPA_HIBERNATE_DDL_AUTO:create}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}
    open-in-view: false

jwt:
  prefix: ${JWT_PREFIX:Bearer}
  header: ${JWT_HEADER:Authorization}
  secret: ${JWT_SECRET}
  accessExpiration: ${JWT_ACCESS_EXP:3600}
  refreshExpiration: ${JWT_REFRESH_EXP:3600}

dsm:
  auth:
    url: ${DSM_AUTH_URL:https://prod-server.xquare.app/dsm-login}